# =============================================================================
# COMET Framework — Build Paper CI Workflow
#
# This workflow compiles the LaTeX paper on every push to main and on pull
# requests targeting main. It installs a minimal TeX Live subset and runs the
# build_paper.sh script. The resulting PDF is uploaded as a CI artifact.
# =============================================================================

name: Build Paper

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Compile LaTeX Paper
    runs-on: ubuntu-latest

    steps:
      # ---------------------------------------------------------------
      # Step 1: Check out the repository
      # ---------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------------------------------------------
      # Step 2: Cache TeX Live packages to speed up subsequent builds
      # ---------------------------------------------------------------
      - name: Cache TeX Live
        uses: actions/cache@v4
        with:
          path: /usr/local/texlive
          key: texlive-${{ runner.os }}-2024-${{ hashFiles('paper/comet_paper.tex') }}
          restore-keys: |
            texlive-${{ runner.os }}-2024-

      # ---------------------------------------------------------------
      # Step 3: Install TeX Live and pandoc
      # ---------------------------------------------------------------
      - name: Install TeX Live and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-science \
            texlive-bibtex-extra \
            biber \
            pandoc

      # ---------------------------------------------------------------
      # Step 4: Install Python dependencies
      # ---------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      # ---------------------------------------------------------------
      # Step 5: Build the paper
      # ---------------------------------------------------------------
      - name: Build paper (pdflatex + bibtex + pandoc)
        run: bash scripts/build_paper.sh

      # ---------------------------------------------------------------
      # Step 6: Verify the PDF was generated
      # ---------------------------------------------------------------
      - name: Verify PDF output
        run: |
          if [ ! -f paper/comet_paper.pdf ]; then
            echo "ERROR: paper/comet_paper.pdf was not generated."
            exit 1
          fi
          echo "PDF size: $(du -h paper/comet_paper.pdf | cut -f1)"

      # ---------------------------------------------------------------
      # Step 7: Upload the compiled PDF as a build artifact
      # ---------------------------------------------------------------
      - name: Upload paper PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: comet-paper-pdf
          path: paper/comet_paper.pdf
          retention-days: 30

      # ---------------------------------------------------------------
      # Step 8 (optional): Upload DOCX if generated
      # ---------------------------------------------------------------
      - name: Upload paper DOCX artifact
        if: hashFiles('paper/comet_paper.docx') != ''
        uses: actions/upload-artifact@v4
        with:
          name: comet-paper-docx
          path: paper/comet_paper.docx
          retention-days: 30
